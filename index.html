<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>

    <div id="clock">
        <h1 class="heading">DIGITAL CLOCK</h1>
        <div id="time"></div>

    </div>

    <div id="stopwatch">
        <h1 class="heading">STOPWATCH</h1>
         <div id="display">00:00:00</div>
         <div id="bottom">
            <button id="one">Start</button>
            <button id="two">Stop</button>
            <button id="three">Reset</button>
         </div>

    </div>

    <script src="./index.js"></script>
    
</body>
</html>
